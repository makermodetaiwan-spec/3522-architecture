*{box-sizing:border-box;margin:0;padding:0}
:root{

  --navy3:#1e3f73;
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --white:#ffffff;
  --card-text:#0f2340;
  --muted:#7a8fa8;
}
body{

  color:#dde4ef;
}
header{
  background:linear-gradient(160deg,#081525 0%,#16305a 100%);
  border-bottom:3px solid var(--gold);
  padding:32px 20px 28px;
  text-align:center;
  position:relative;
}
header::before{
  content:'';
  position:absolute;
  bottom:-3px;left:50%;transform:translateX(-50%);
  width:120px;height:3px;background:var(--gold2);
}
.logo{

}
header h1{

}

}
.controls{

  flex-wrap:wrap;
  gap:10px;
}
.search-wrap{
  flex:1;
  min-width:200px;
  position:relative;
}
.search-wrap svg{
  position:absolute;
  left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);
  pointer-events:none;
}
input[type=text]{
  width:100%;
  padding:11px 14px 11px 38px;
  background:#1a3356;
  border:1.5px solid #2a4a70;
  border-radius:8px;
  color:#dde4ef;
  font-size:.95rem;
  outline:none;
  transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--gold)}
input[type=text]::placeholder{color:var(--muted)}
select{
  padding:11px 36px 11px 14px;
  background:#1a3356;
  border:1.5px solid #2a4a70;
  border-radius:8px;
  color:#dde4ef;
  font-size:.88rem;

  background-repeat:no-repeat;
  background-position:right 10px center;
}
select:focus{border-color:var(--gold)}
.stats{
  max-width:1140px;
  margin:14px auto 0;
  padding:0 20px;
  color:var(--muted);
  font-size:.82rem;
}
.grid{
  max-width:1140px;
  margin:16px auto 48px;
  padding:0 16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:16px;
}
.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.35);
  transition:transform .18s,box-shadow .18s;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 24px rgba(201,168,76,.22);
}
.card-top{
  padding:18px 18px 14px;
  border-left:4px solid var(--gold);
}
.card-company{
  font-size:.98rem;
  font-weight:700;
  color:#0f2340;
  line-height:1.4;
  margin-bottom:5px;
}
.tag{
  display:inline-block;
  font-size:.7rem;
  background:#eef3fa;
  color:#4a6a90;
  border-radius:4px;
  padding:2px 7px;
  margin-right:4px;
  margin-bottom:4px;
}
.card-person{
  margin-top:10px;
  display:flex;
  align-items:baseline;
  gap:6px;
  flex-wrap:wrap;
}
.card-name{
  font-size:.95rem;
  font-weight:600;
  color:#0f2340;
}
.card-nick{
  font-size:.8rem;
  color:#7a8fa8;
}
.card-title{
  width:100%;
  font-size:.78rem;
  color:var(--gold);
  font-weight:600;
  margin-top:3px;
  letter-spacing:.5px;
}
.card-club{
  margin-top:6px;
  font-size:.73rem;
  color:#9aaabf;
}
.card-contact{
  display:none;
  background:#f5f8fc;
  border-top:1px solid #dde8f4;
  padding:14px 18px;
}
.card.open .card-contact{display:block}
.chevron{
  float:right;
  width:18px;height:18px;
  color:#b0bfd4;
  transition:transform .2s;
  margin-top:2px;
}
.card.open .chevron{transform:rotate(180deg)}
.ci{
  display:flex;
  gap:8px;
  font-size:.83rem;
  color:#2a3a5a;
  margin-bottom:7px;
  align-items:flex-start;
}
.ci:last-child{margin-bottom:0}
.ci-label{
  color:#9aaabf;
  min-width:42px;
  font-size:.75rem;
  padding-top:1px;
  flex-shrink:0;
}
.ci-val{word-break:break-all}
.empty{
  text-align:center;
  color:var(--muted);
  padding:80px 0;
  font-size:1rem;
  grid-column:1/-1;
}
@media(max-width:600px){
  header h1{font-size:1.5rem}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

  clubSel.appendChild(o);
});

function shortCat(c) {
  if (!c) return [];
  return c.split(',').map(s => s.trim()).filter(Boolean).map(s => {
    if (s.includes('建設公司')) return '建設公司';
    if (s.includes('開發公司')) return '開發公司';
    if (s.includes('工程公司')) return '工程/營造';
    if (s.includes('建材設備')) return '建材設備';
    if (s.includes('裝潢')) return '裝潢';
    if (s.includes('設計師')) return '設計師';
    if (s.includes('建築師')) return '建築師/技師';
    if (s.includes('不動產代銷')) return '不動產代銷';
    if (s.includes('不動產仲介')) return '不動產仲介';
    if (s.includes('代書')) return '代書';
    return s;
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(list) {
  if (!list.length) {
    grid.innerHTML = '<div class="empty">沒有符合的資料</div>';
    stats.textContent = '';
    return;
  }
  stats.textContent = `顯示 ${list.length} / ${DATA.length} 筆`;
  grid.innerHTML = list.map((d,i) => {
    const tags = shortCat(d.category).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const contactRows = [
      d.phone ? `<div class="ci"><span class="ci-label">電話</span><span class="ci-val">${esc(d.phone)}</span></div>` : '',
      d.line  ? `<div class="ci"><span class="ci-label">Line</span><span class="ci-val">${esc(d.line)}</span></div>` : '',
      d.email ? `<div class="ci"><span class="ci-label">Email</span><span class="ci-val">${esc(d.email)}</span></div>` : '',
    ].filter(Boolean).join('');
    const hasContact = contactRows.length > 0;
    return `<div class="card" data-i="${i}" onclick="toggle(this)">
  <div class="card-top">
    ${hasContact ? `<svg class="chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>` : ''}
    <div class="card-company">${esc(d.company)||'—'}</div>
    <div>${tags}</div>
    <div class="card-person">
      <span class="card-name">${esc(d.name)||'—'}</span>
      ${d.nickname?`<span class="card-nick">${esc(d.nickname)}</span>`:''}
      ${d.title?`<div class="card-title">${esc(d.title)}</div>`:''}
    </div>
    ${d.club?`<div class="card-club">${esc(d.club)}</div>`:''}
  </div>
  ${hasContact?`<div class="card-contact">${contactRows}</div>`:''}
</div>`;
  }).join('');
}

function toggle(card) {
  card.classList.toggle('open');
}

function filter() {
  const q = qInput.value.toLowerCase();
  const cat = catSel.value;
  const club = clubSel.value;
  const res = DATA.filter(d => {
    if (q && !((d.company+d.name+d.nickname+d.title+d.category).toLowerCase().includes(q))) return false;
    if (cat && !d.category.split(',').map(s=>s.trim()).includes(cat)) return false;
    if (club && d.club !== club) return false;
    return true;
  });
  render(res);
}

qInput.addEventListener('input', filter);
catSel.addEventListener('change', filter);
clubSel.addEventListener('change', filter);

render(DATA);
