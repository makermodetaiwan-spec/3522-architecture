function initials(name) { return name ? name[0] : '?'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function splitIndustries(industry) {
  return industry ? industry.split(',').map(s => s.trim()).filter(Boolean) : [];
}
function expandRow(label, val, href) {
  if (!val) return '';
  const display = href ? `<a href="${href}">${esc(val)}</a>` : esc(val);
  return `<div class="expand-row"><span class="label">${label}</span><span class="val">${display}</span></div>`;
}

function render(data) {
  const grid = document.getElementById('grid');
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-result">找不到符合的會員</div>';
    document.getElementById('count').textContent = '0 位';
    return;
  }
  document.getElementById('count').textContent = `顯示 ${data.length} 位`;
  grid.innerHTML = data.map(m => {
    const industries = splitIndustries(m.industry);
    const tagHtml = industries.map(i => `<span class="tag">${esc(i)}</span>`).join('');
    return `
    <div class="card" onclick="toggle(this)">
      <div class="card-front">
        ${m.company ? `<div class="company-name">${esc(m.company)}</div>` : ''}
        <div class="person-row">
          <div class="initials">${initials(m.name)}</div>
          <div class="person-info">
            <div class="name">${esc(m.name)}</div>
            ${m.nick ? `<div class="nick">${esc(m.nick)}</div>` : ''}
          </div>
          <span class="arrow">▼</span>
        </div>
        <div class="meta">
          ${m.title ? `<div class="meta-row"><span class="meta-label">職稱</span><span class="meta-val">${esc(m.title)}</span></div>` : ''}
          ${m.club ? `<div class="meta-row"><span class="meta-label">扶輪社</span><span class="meta-val">${esc(m.club)}</span></div>` : ''}
          ${tagHtml ? `<div class="meta-row"><span class="meta-label">職業</span><div class="tags">${tagHtml}</div></div>` : ''}
        </div>
      </div>
      <div class="card-expand">
        ${expandRow('電話', m.phone, m.phone ? 'tel:' + m.phone : null)}
        ${expandRow('Line ID', m.line)}
        ${expandRow('Email', m.email, m.email ? 'mailto:' + m.email : null)}
        ${expandRow('服務對象', m.service)}
        ${expandRow('備註', m.note)}
      </div>
    </div>`;
  }).join('');
}

function toggle(card) { card.classList.toggle('open'); }

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const ind = document.getElementById('filterIndustry').value;
  const club = document.getElementById('filterClub').value;
  const result = DATA.filter(m => {
    const matchQ = !q || [m.name, m.company, m.nick, m.title].some(v => v.toLowerCase().includes(q));
    const matchInd = !ind || splitIndustries(m.industry).includes(ind);
    const matchClub = !club || m.club === club;
    return matchQ && matchInd && matchClub;
  });
  render(result);
}

document.getElementById('search').addEventListener('input', filter);
document.getElementById('filterIndustry').addEventListener('change', filter);
document.getElementById('filterClub').addEventListener('change', filter);

render(DATA);
</script>
